name: Bug report
description: Report something that isn't working as documented
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please **do not** report security issues here — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: I ran `agentforge init claude-code` and …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands, in order.
      placeholder: |
        1. git clone … && cd AgentForge
        2. npm install -g .
        3. agentforge init …
    validations:
      required: true
  - type: input
    id: adapter
    attributes:
      label: Adapter
      description: Which adapter (claude-code, codex, cursor, generic) — or N/A.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell (e.g. Git Bash on Windows), `node --version`, AgentForge version/commit.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste command output or errors. Redact any personal paths or tokens.
      render: shell
    validations:
      required: false
