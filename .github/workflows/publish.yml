name: publish

# Publishes AgentForge to npm when a GitHub Release is published.
# Requires repository secret NPM_TOKEN (an npm automation/granular token with
# publish rights to the `agentforge` package). Uses npm provenance, so the
# published package is cryptographically linked to this repo + workflow run.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run verify + npm publish --dry-run only (no real publish)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify (round-trip + merge-safe + pack-install + mcp)
        run: npm run verify
      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --provenance --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
