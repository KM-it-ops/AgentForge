name: gitleaks

# Secret-scanning safety net: fails the build if a credential is ever committed.
on:
  push:
  pull_request:
  workflow_dispatch:

# Run bundled JS actions (checkout) on Node 24 — opts out of the deprecated
# Node 20 action runtime ahead of the forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so leaks in any commit are caught
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
