name: round-trip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Run bundled JS actions (checkout, setup-node) on Node 24 — opts out of the
# deprecated Node 20 action runtime ahead of the forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  round-trip:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['20', '22']
    runs-on: ${{ matrix.os }}
    name: round-trip (${{ matrix.os }}, node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Verify AgentForge
        run: npm run verify
