# memory.yaml — memory bucket structure and protocol.
# Adapters create the directory structure + MEMORY.md index per platform.
#
# Lift origin: ~/.claude/MEMORY.md + ~/.claude/memory/ + CLAUDE.md ## Memory Protocol.

schema_version: 1

# Buckets — each becomes a directory and a section in MEMORY.md.
buckets:
  - name: user
    purpose: Preferences, profile facts, corrections the agent should remember across sessions
    seed: false  # don't pre-populate
  # NOTE: logs/prune-reports do NOT live here — they go to logs/ (outside the brain).
  # feedback/ holds curated knowledge only. No seeded files.
  - name: feedback
    purpose: Validated approaches, corrections, conventions (curated knowledge — NOT logs)
    seed: false
  - name: project
    purpose: Per-project decisions, schemas, gotchas, Live State
    seed: false
  - name: reference
    purpose: External system pointers (dashboards, repos, tools, patterns)
    seed: false

# Protocol for memory writes (rendered into identity file).
protocol:
  always_loaded: MEMORY.md (generated index — never hand-edit; regenerate so it reflects every memory/ file)
  load_on_demand: bucket files referenced by user intent or task
  write_triggers:
    - 'One fact per file: YAML frontmatter (name/description/metadata.type) + [[wikilinks]]'
    - 'Markdown run-logs go to logs/; JSONL telemetry stays in telemetry/; never memory/'
    - 'Significant session learnings → write one file per genuine learning; no duplicates'
    - 'Regenerate MEMORY.md so it reflects every memory/ file (no drift)'
    - 'Verify a recalled fact against current state before acting on it'

# Index file (MEMORY.md) template.
# Adapter substitutes {bucket_links} with per-bucket markdown.
index_template: |
  # Memory Index

  Index for the auto-memory protocol. Entries are one line, under ~150 chars.
  Generated — keep in sync with every file under `memory/{user,feedback,project,reference}/`
  (regenerate; do not let it drift). Logs live in `logs/`, never in `memory/`.

  {bucket_sections}
