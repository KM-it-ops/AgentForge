    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Map repo structure, current app purpose, verification commands, build/test state, and obvious flagship-readiness gaps."
    inputs:
      - "README.md"
      - "package.json"
      - "docs"
      - "spec"
      - ".github"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Prefer concrete file-path evidence and runnable commands over generic advice."
      - "Do not load external references or named skills unless a later task explicitly permits it."
    expected_output:
      - "Repo structure and purpose map"
      - "Verification commands and current build/test state"
      - "Obvious flagship-readiness gaps"
      - "Candidate implementation tranches with evidence"
