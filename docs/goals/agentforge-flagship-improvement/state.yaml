# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "AgentForge Flagship Improvement"
  slug: "agentforge-flagship-improvement"
  kind: open_ended
  tranche: "Complete successive safe verified slices until AgentForge has current repo health evidence plus a verified, polished demo/app experience or equivalent flagship-ready artifact."
  status: done
  oracle:
    signal: "Current repo health evidence plus a verified, polished demo/app experience or equivalent artifact showing AgentForge is flagship-ready."
    cadence: "after each Worker package and at final audit"
    final_proof: "A final Judge or PM receipt maps completed task receipts, verification commands, and demo/app walkthrough evidence to the flagship-ready outcome and records full_outcome_complete: true."
  intake:
    original_request: "Prepare a fresh GoalBuddy board for making C:\\AI\\AgentForge a flagship project through phased technical-health and demo-readiness improvements."
    interpreted_outcome: "AgentForge becomes a flagship-quality local repo through scoped discovery, prioritized implementation slices, verification, and final demo/readiness proof."
    input_shape: vague
    audience: "repo owner and future users/evaluators of AgentForge"
    authority: approved
    proof_type: demo
    completion_proof: "Current repo health evidence plus a verified, polished demo/app experience or equivalent artifact showing the project is flagship-ready."
    likely_misfire: "GoalBuddy succeeds at broad discovery, cosmetic cleanup, or many tiny improvements without proving technical health and demo-readiness against the flagship oracle."
    blind_spots_considered:
      - "The goal is intentionally broad and could sprawl without Judge-selected implementation tranches."
      - "Flagship quality must cover both technical health and visible demo/readiness proof."
      - "Credentials, secrets, destructive operations, production changes, and major dependency churn still need explicit approval."
    existing_plan_facts:
      - "Create only docs/goals/agentforge-flagship-improvement/goal.md, state.yaml, notes/, and generated local board artifacts."
      - "Use the local live GoalBuddy board."
      - "Start with Scout, queue Judge selection, queue a bounded Worker slot, queue PM continuation, and finish with Judge audit."
      - "Record Scout, Worker, and Judge availability as bundled_not_installed unless installed configs are verified."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/agentforge-flagship-improvement/"
    command: "npx goalbuddy board docs/goals/agentforge-flagship-improvement"

active_task: null

tasks:
